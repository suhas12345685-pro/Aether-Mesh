# =============================================================================
# Aether Mesh — Nginx Cloud Config
# TLS termination, reverse proxy to platform:8080, WebSocket support,
# rate limiting, security headers, and tenant subdomain routing.
# =============================================================================

# ---- Rate limit zones (defined in http context) ----------------------------
# 10 r/s on auth routes, 50 r/s general
limit_req_zone $binary_remote_addr zone=auth_limit:10m   rate=10r/s;
limit_req_zone $binary_remote_addr zone=general_limit:20m rate=50r/s;

# ---- Tenant upstream map (populated by provision-tenant.sh) ----------------
# Format: "subdomain.aethermesh.app"  "container-name:8080";
map $host $tenant_upstream {
    include /etc/nginx/upstream.map;
    default  "aether:8080";    # fallback → main stack
}

# ---- Logging ---------------------------------------------------------------
log_format json_combined escape=json
    '{"time":"$time_iso8601",'
    '"remote_addr":"$remote_addr",'
    '"method":"$request_method",'
    '"uri":"$request_uri",'
    '"status":$status,'
    '"body_bytes":$body_bytes_sent,'
    '"request_time":$request_time,'
    '"upstream":"$upstream_addr",'
    '"host":"$host"}';

# ---- HTTP → HTTPS redirect + ACME challenge --------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Let's Encrypt HTTP-01 challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Everything else: permanent redirect to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ---- HTTPS — main domain + wildcard subdomains -----------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    # Catch-all for the primary domain and all *.aethermesh.app subdomains.
    # Replace ${DOMAIN} with your actual domain when not using envsubst.
    server_name aethermesh.app *.aethermesh.app;

    # ---- TLS ---------------------------------------------------------------
    ssl_certificate     /etc/letsencrypt/live/aethermesh.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aethermesh.app/privkey.pem;

    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;

    # OCSP stapling
    ssl_stapling        on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/letsencrypt/live/aethermesh.app/chain.pem;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # ---- Security headers --------------------------------------------------
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "DENY"                                          always;
    add_header X-Content-Type-Options    "nosniff"                                       always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"               always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()"      always;
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' wss:; font-src 'self'; frame-ancestors 'none'"
        always;

    # ---- Buffer / timeout tuning -------------------------------------------
    client_max_body_size       16m;
    client_body_buffer_size    128k;
    proxy_connect_timeout      10s;
    proxy_send_timeout         60s;
    proxy_read_timeout         60s;
    proxy_buffer_size          4k;
    proxy_buffers              8 4k;

    # ---- Proxy headers (shared across locations) ---------------------------
    proxy_http_version      1.1;
    proxy_set_header        Host              $host;
    proxy_set_header        X-Real-IP         $remote_addr;
    proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header        X-Forwarded-Proto $scheme;

    # WebSocket upgrade support (for the unlock/push flow)
    proxy_set_header        Upgrade           $http_upgrade;
    proxy_set_header        Connection        $connection_upgrade;

    access_log /var/log/nginx/access.log json_combined;
    error_log  /var/log/nginx/error.log  warn;

    # ---- Auth / login routes — strict rate limit ---------------------------
    location ~ ^/(api/auth|api/login|api/register|api/unlock) {
        limit_req zone=auth_limit burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://$tenant_upstream;
    }

    # ---- Stripe webhook — no rate limit (Stripe IPs only ideally) ----------
    location /api/billing/webhook {
        proxy_pass         http://$tenant_upstream;
        proxy_read_timeout 30s;
    }

    # ---- WebSocket endpoint for unlock / realtime events -------------------
    location /ws {
        proxy_pass         http://$tenant_upstream;
        proxy_read_timeout 3600s;   # keep long-lived connections alive
        proxy_send_timeout 3600s;
    }

    # ---- Health / readiness endpoints (internal, no rate limit) -----------
    location ~ ^/(health|ready) {
        proxy_pass http://aether:8080;
        access_log off;
    }

    # ---- General application routes ----------------------------------------
    location / {
        limit_req zone=general_limit burst=100 nodelay;
        limit_req_status 429;

        proxy_pass http://$tenant_upstream;
    }
}

# ---- WebSocket connection upgrade map --------------------------------------
map $http_upgrade $connection_upgrade {
    default upgrade;
    ""      close;
}
